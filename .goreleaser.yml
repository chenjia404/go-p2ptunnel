# This is an example .goreleaser.yml file with some sane defaults.
# Make sure to check the documentation at http://goreleaser.com
version: 2
project_name: go-p2ptunnel
before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy
    # you may remove this if you don't need go generate
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - 386
      - amd64
      - arm
      - arm64
      - mipsle
    ignore:
      - goos: windows
        goarch: arm
        goarm: 6
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.gitRev="{{.ShortCommit}}" -X main.buildTime="{{.CommitDate}}"
    asmflags:
      - all=-trimpath={{.Env.GOPATH}}
      - ./dontoptimizeme=-N
    gcflags:
      - all=-trimpath={{.Env.GOPATH}}

archives:
  -
    id: go-p2ptunnel
    formats: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds_info:
      mode: 0777
    format_overrides:
      - goos: windows
        formats: zip


checksum:
  name_template: 'checksums.txt'
  algorithm: sha512

signs:
  - artifacts: all
    signature: "${artifact}.asc"
    cmd: C:\soft\GnuPG\bin\gpg.exe
    args: ["--armor","-u","189BE79683369DA3","--detach-sign", "${artifact}"]

snapshot:
  version_template: "{{ .Tag }}"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

dockers_v2:
  - 
    images:
      - "chenjia404/{{.ProjectName}}:latest"
      - "chenjia404/{{.ProjectName}}:latest-amd64"
      - "chenjia404/{{.ProjectName}}:amd64"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: "goreleaser.dockefile"
    extra_files:
      - LICENSE.txt